<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qmed - Privacy-Preserving Liver Transplant Matching</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Courier New',monospace;background:#0a0e1a;color:#e0e0e0;font-size:14px;}
.container{max-width:1400px;margin:0 auto;padding:16px;}
header{text-align:center;padding:20px 0 12px;position:relative;}
header h1{font-size:2em;color:#4fc3f7;letter-spacing:2px;}
header .sub{color:#78909c;font-size:0.95em;margin-top:4px;}
.lang-toggle{position:absolute;top:12px;right:0;display:flex;}
.lang-btn{background:#1a2332;color:#78909c;border:1px solid #2a3a4a;padding:4px 12px;cursor:pointer;font-size:12px;}
.lang-btn:first-child{border-radius:3px 0 0 3px;}.lang-btn:last-child{border-radius:0 3px 3px 0;}
.lang-btn.active{background:#1565c0;color:white;border-color:#1565c0;}

.controls{display:flex;gap:12px;justify-content:center;margin:12px 0;flex-wrap:wrap;align-items:end;}
.controls label{color:#78909c;font-size:0.85em;}
.controls input{background:#111827;border:1px solid #2a3a4a;color:#4fc3f7;padding:6px 8px;border-radius:3px;font-family:inherit;font-size:14px;width:70px;}
.btn{background:#1565c0;color:white;border:none;padding:8px 24px;border-radius:4px;font-family:inherit;font-size:14px;cursor:pointer;font-weight:bold;}
.btn:hover{background:#1976d2;}.btn.running{background:#455a64;cursor:wait;}

.main{display:grid;grid-template-columns:1fr 320px;gap:16px;margin:12px 0;}
@media(max-width:900px){.main{grid-template-columns:1fr;}.viz{display:none;}}

.log{background:#111827;border:1px solid #1a2332;border-radius:6px;padding:12px;min-height:500px;max-height:80vh;overflow-y:auto;font-size:13px;line-height:1.6;}
.log .line{margin:1px 0;white-space:pre-wrap;word-break:break-all;}
.log .header{color:#4fc3f7;font-weight:bold;}
.log .step-label{color:#ffa726;font-weight:bold;}
.log .data{color:#78909c;}
.log .hex{color:#66bb6a;font-size:12px;}
.log .result{color:#66bb6a;font-weight:bold;}
.log .warn{color:#ffa726;}
.log .dim{color:#546e7a;}
.log .progress-bar{display:inline-block;}
.log .privacy{color:#a5d6a7;background:#1b5e20;padding:0 4px;border-radius:2px;font-size:12px;}

.viz{background:#111827;border:1px solid #1a2332;border-radius:6px;padding:12px;position:sticky;top:16px;height:fit-content;}
.viz svg{width:100%;height:auto;}
.viz-node{transition:opacity 0.4s;}.viz-node.off{opacity:0.12;}.viz-node.on{opacity:1;}

.results{margin:16px 0;}
.results table{width:100%;border-collapse:collapse;background:#111827;border-radius:6px;overflow:hidden;}
.results th{background:#1a2332;padding:8px;text-align:left;color:#4fc3f7;font-size:0.85em;}
.results td{padding:8px;border-bottom:1px solid #1a2332;font-size:0.9em;}
.hidden{display:none;}
footer{text-align:center;padding:20px 0;color:#546e7a;font-size:0.8em;}
footer a{color:#4fc3f7;text-decoration:none;}
</style>
</head>
<body>
<div class="container">
<header>
  <div class="lang-toggle"><button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button><button class="lang-btn active" id="langJa" onclick="setLang('ja')">JA</button></div>
  <h1>qmed</h1>
  <div class="sub" id="headerSub"></div>
  <div class="sub" style="color:#ffa726;font-size:0.85em;">NEDO Challenge Q-2 | hyde x argo x plat x Quantum</div>
</header>

<div class="controls">
  <div><label data-i18n="labelDonors"></label><br><input type="number" id="nDonors" value="20" min="2" max="500"></div>
  <div><label data-i18n="labelRecipients"></label><br><input type="number" id="nRecipients" value="20" min="2" max="500"></div>
  <div><label>Sweeps</label><br><input type="number" id="nSweeps" value="2000" min="100" max="50000"></div>
  <button class="btn" id="runBtn" onclick="run()" data-i18n="btnRun"></button>
</div>

<div class="main">
  <div class="log" id="log"></div>
  <div class="viz">
    <svg viewBox="0 0 280 700" xmlns="http://www.w3.org/2000/svg">
      <g id="vP" class="viz-node off">
        <circle cx="70" cy="36" r="14" fill="#4fc3f7"/><text x="70" y="40" text-anchor="middle" fill="#0a0e1a" font-size="12" font-weight="bold">D</text>
        <rect x="58" y="54" width="24" height="32" rx="4" fill="#1a2332" stroke="#4fc3f7" stroke-width="1.5"/><rect x="62" y="58" width="16" height="20" rx="1" fill="#0a0e1a"/>
        <circle cx="210" cy="36" r="14" fill="#ffa726"/><text x="210" y="40" text-anchor="middle" fill="#0a0e1a" font-size="12" font-weight="bold">R</text>
        <rect x="198" y="54" width="24" height="32" rx="4" fill="#1a2332" stroke="#ffa726" stroke-width="1.5"/><rect x="202" y="58" width="16" height="20" rx="1" fill="#0a0e1a"/>
      </g>
      <g id="vE" class="viz-node off">
        <line x1="70" y1="90" x2="70" y2="125" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="3,3"/>
        <line x1="210" y1="90" x2="210" y2="125" stroke="#ffa726" stroke-width="1.5" stroke-dasharray="3,3"/>
        <rect x="54" y="128" width="32" height="22" rx="3" fill="#1b5e20" stroke="#66bb6a" stroke-width="1.5"/>
        <path d="M64 128v-7a6 6 0 0 1 12 0v7" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
        <text x="70" y="143" text-anchor="middle" fill="#a5d6a7" font-size="7">ENC</text>
        <rect x="194" y="128" width="32" height="22" rx="3" fill="#1b5e20" stroke="#66bb6a" stroke-width="1.5"/>
        <path d="M204 128v-7a6 6 0 0 1 12 0v7" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
        <text x="210" y="143" text-anchor="middle" fill="#a5d6a7" font-size="7">ENC</text>
      </g>
      <g id="vS" class="viz-node off">
        <line x1="70" y1="154" x2="140" y2="200" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="3,3"/>
        <line x1="210" y1="154" x2="140" y2="200" stroke="#ffa726" stroke-width="1.5" stroke-dasharray="3,3"/>
        <rect x="105" y="195" width="70" height="36" rx="6" fill="#1a2332" stroke="#4fc3f7" stroke-width="1.5"/>
        <text x="140" y="210" text-anchor="middle" fill="#4fc3f7" font-size="9" font-weight="bold">plat</text>
        <text x="140" y="224" text-anchor="middle" fill="#78909c" font-size="7">FHE Score</text>
      </g>
      <g id="vZ" class="viz-node off">
        <line x1="140" y1="235" x2="140" y2="275" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="3,3"/>
        <rect x="105" y="275" width="70" height="36" rx="6" fill="#1a2332" stroke="#66bb6a" stroke-width="1.5"/>
        <text x="140" y="290" text-anchor="middle" fill="#66bb6a" font-size="9" font-weight="bold">argo</text>
        <text x="140" y="304" text-anchor="middle" fill="#78909c" font-size="7">ZKP</text>
        <circle cx="185" cy="293" r="8" fill="#1b5e20"/><path d="M180 293l3 3 7-7" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
      </g>
      <g id="vQ" class="viz-node off">
        <line x1="140" y1="315" x2="140" y2="355" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="3,3"/>
        <rect x="90" y="355" width="100" height="44" rx="6" fill="#1a2332" stroke="#9c27b0" stroke-width="1.5"/>
        <text x="140" y="373" text-anchor="middle" fill="#ce93d8" font-size="9" font-weight="bold">Quantum</text>
        <text x="140" y="389" text-anchor="middle" fill="#78909c" font-size="7" id="vQprog">QUBO</text>
      </g>
      <g id="vN" class="viz-node off">
        <line x1="120" y1="403" x2="70" y2="460" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="3,3"/>
        <line x1="160" y1="403" x2="210" y2="460" stroke="#ffa726" stroke-width="1.5" stroke-dasharray="3,3"/>
        <rect x="54" y="460" width="32" height="36" rx="4" fill="#1a2332" stroke="#4fc3f7" stroke-width="1.5"/>
        <text x="70" y="482" text-anchor="middle" fill="#66bb6a" font-size="12">!</text>
        <rect x="194" y="460" width="32" height="36" rx="4" fill="#1a2332" stroke="#ffa726" stroke-width="1.5"/>
        <text x="210" y="482" text-anchor="middle" fill="#66bb6a" font-size="12">!</text>
        <text x="140" y="485" text-anchor="middle" fill="#66bb6a" font-size="9" id="vMtxt">MATCH</text>
      </g>
      <g id="vH" class="viz-node off">
        <line x1="86" y1="500" x2="120" y2="530" stroke="#4fc3f7" stroke-width="1.5"/>
        <line x1="194" y1="500" x2="160" y2="530" stroke="#ffa726" stroke-width="1.5"/>
        <text x="140" y="533" text-anchor="middle" fill="#66bb6a" font-size="8" id="vCtxt">CONSENT</text>
        <line x1="140" y1="540" x2="140" y2="560" stroke="#66bb6a" stroke-width="1.5"/>
        <polygon points="134,560 140,568 146,560" fill="#66bb6a"/>
        <rect x="100" y="572" width="80" height="34" rx="5" fill="#1a2332" stroke="#78909c" stroke-width="1" stroke-dasharray="4,2"/>
        <text x="140" y="588" text-anchor="middle" fill="#78909c" font-size="8" id="vHtxt">Hospital</text>
        <text x="140" y="600" text-anchor="middle" fill="#546e7a" font-size="6" id="vHsub">operation only</text>
      </g>
    </svg>
  </div>
</div>

<div class="results hidden" id="resultsSection">
  <table>
    <tr><th></th><th>Greedy</th><th id="thQ">Quantum</th><th id="thD">Diff</th></tr>
    <tr><td id="tdM">Matches</td><td id="gM">-</td><td id="qM">-</td><td id="dM" style="color:#66bb6a">-</td></tr>
    <tr><td id="tdS">Score</td><td id="gS">-</td><td id="qS">-</td><td id="dS">-</td></tr>
    <tr><td id="tdT">Time</td><td id="gT">-</td><td id="qT">-</td><td>-</td></tr>
  </table>
</div>

<footer>
  <p>qmed | <a href="https://github.com/Ryujiyasu/qmed">github.com/Ryujiyasu/qmed</a></p>
  <p id="footerMsg"></p>
</footer>
</div>

<script>
const T={
  ja:{headerSub:"プライバシー保護型 肝臓移植マッチング",labelDonors:"ドナー数",labelRecipients:"レシピエント数",btnRun:"実行",btnRunning:"計算中...",
    thQ:"量子",thD:"差分",tdM:"マッチ数",tdS:"スコア",tdT:"時間",footerMsg:"データは個人から出ない。病院は合意後にのみ関与。",
    vizMatch:"適合",vizConsent:"合意",vizHospital:"病院",vizHospitalSub:"手術のみ"},
  en:{headerSub:"Privacy-Preserving Liver Transplant Matching",labelDonors:"Donors",labelRecipients:"Recipients",btnRun:"Run",btnRunning:"Computing...",
    thQ:"Quantum",thD:"Diff",tdM:"Matches",tdS:"Score",tdT:"Time",footerMsg:"Data never leaves the individual. Hospital only after consent.",
    vizMatch:"MATCH",vizConsent:"CONSENT",vizHospital:"Hospital",vizHospitalSub:"operation only"}
};
let lang='ja';
function setLang(l){
  lang=l;
  document.getElementById('langEn').classList.toggle('active',l==='en');
  document.getElementById('langJa').classList.toggle('active',l==='ja');
  const t=T[l];
  document.getElementById('headerSub').textContent=t.headerSub;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(t[k])el.textContent=t[k];});
  ['thQ','thD','tdM','tdS','tdT','footerMsg'].forEach(k=>{const el=document.getElementById(k);if(el)el.textContent=t[k];});
  document.getElementById('vMtxt').textContent=t.vizMatch;
  document.getElementById('vCtxt').textContent=t.vizConsent;
  document.getElementById('vHtxt').textContent=t.vizHospital;
  document.getElementById('vHsub').textContent=t.vizHospitalSub;
}

const logEl=document.getElementById('log');
function log(cls,text){const d=document.createElement('div');d.className='line '+cls;d.textContent=text;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;}
function logHtml(cls,html){const d=document.createElement('div');d.className='line '+cls;d.innerHTML=html;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;}
function vizOn(id){document.getElementById(id).classList.remove('off');document.getElementById(id).classList.add('on');}
function vizReset(){document.querySelectorAll('.viz-node').forEach(n=>{n.classList.add('off');n.classList.remove('on');});}

let worker=null;
function run(){
  const nd=+document.getElementById('nDonors').value,nr=+document.getElementById('nRecipients').value,sw=+document.getElementById('nSweeps').value;
  const btn=document.getElementById('runBtn');
  btn.classList.add('running');btn.textContent=T[lang].btnRunning;
  logEl.innerHTML='';vizReset();
  document.getElementById('resultsSection').classList.add('hidden');

  log('header','=== qmed: Privacy-Preserving Liver Transplant Matching ===');
  log('dim',`${new Date().toISOString()}`);
  log('','');

  if(worker)worker.terminate();
  worker=new Worker('worker.js');

  worker.onmessage=function(e){
    const d=e.data;
    switch(d.type){
      case 'keys':
        log('step-label','[Step 1] Anonymous Key Generation (hyde + TPM / ML-KEM-768)');
        vizOn('vP');
        d.keys.forEach(k=>{
          log('data',`  ${k.id}`);
          log('hex',`    key: ${k.keyHex.substring(0,48)}...`);
        });
        if(d.total>d.keys.length) log('dim',`  ... +${d.total-d.keys.length} more keys`);
        logHtml('',`  <span class="privacy">PRIVACY: keys generated locally on device - never transmitted</span>`);
        log('','');
        break;

      case 'encrypted':
        log('step-label','[Step 2] Encrypt Medical Data (plat / FHE-CKKS)');
        vizOn('vE');
        d.samples.forEach(s=>{
          log('data',`  ${s.id}:`);
          log('data',`    plaintext:  ${JSON.stringify(s.plain)}`);
          log('hex',`    ciphertext: ${s.cipher.substring(0,56)}...`);
        });
        log('result',`  ${d.totalRecords} records encrypted`);
        logHtml('',`  <span class="privacy">PRIVACY: ciphertext only - no party can read contents</span>`);
        log('','');
        break;

      case 'scored':
        log('step-label','[Step 3] Compatibility Scoring on Ciphertext (plat / FHE)');
        vizOn('vS');
        log('data',`  Score matrix: ${Math.sqrt(d.totalPairs)}x${Math.sqrt(d.totalPairs)} = ${d.totalPairs} pairs evaluated`);
        log('result',`  Compatible pairs: ${d.nCompat} / ${d.totalPairs} (${(d.nCompat/d.totalPairs*100).toFixed(1)}%)`);
        log('data',`  Computed in ${d.scoreTime.toFixed(1)}ms`);
        if(d.scoreSamples.length){
          log('dim','  Sample scores (encrypted):');
          d.scoreSamples.forEach(s=>log('data',`    ${s.donor} -> ${s.recip}: ${s.score}`));
        }
        logHtml('',`  <span class="privacy">PRIVACY: scores computed on encrypted data - no decryption</span>`);
        log('','');
        break;

      case 'proofs':
        log('step-label','[Step 4] ZKP Proof Generation (argo)');
        vizOn('vZ');
        d.proofSamples.forEach(p=>{
          log('data',`  ${p.donor} <-> ${p.recip}: compatible=${p.compatible} bucket=${p.bucket}`);
          log('hex',`    proof: ${p.proofHex}`);
          log('dim',`    (${p.proofBytes} bytes - verifiable by anyone, reveals nothing about inputs)`);
        });
        log('result',`  ${d.proofCount} ZKP proofs generated`);
        logHtml('',`  <span class="privacy">PRIVACY: proves compatibility without revealing blood type, MELD, identity</span>`);
        log('','');
        break;

      case 'greedy_done':
        log('step-label','[Step 5] Optimal Matching');
        log('data',`  Greedy (baseline): ${d.matches} matches, score=${d.score.toFixed(2)}, time=${d.time.toFixed(1)}ms`);
        log('','  Quantum Annealing (QUBO) starting...');
        vizOn('vQ');
        break;

      case 'sa_progress':
        document.getElementById('vQprog').textContent=`${d.pct}% T=${d.temp}`;
        const bar='#'.repeat(Math.floor(d.pct/2.5))+'.'.repeat(40-Math.floor(d.pct/2.5));
        // Update last line or add
        const lines=logEl.querySelectorAll('.line');
        const last=lines[lines.length-1];
        if(last && last.dataset.progress){
          last.textContent=`  SA [${bar}] ${d.pct}% sweep=${d.sweep}/${d.total} E=${d.energy} matches=${d.currentMatches}`;
        } else {
          const div=document.createElement('div');
          div.className='line warn';div.dataset.progress='1';
          div.textContent=`  SA [${bar}] ${d.pct}% sweep=${d.sweep}/${d.total} E=${d.energy} matches=${d.currentMatches}`;
          logEl.appendChild(div);
        }
        logEl.scrollTop=logEl.scrollHeight;
        break;

      case 'done':
        document.getElementById('vQprog').textContent='DONE';
        log('result',`  Quantum: ${d.quantumMatches} matches, score=${d.quantumScore.toFixed(2)}, time=${d.quantumTime.toFixed(0)}ms`);
        const diff=d.diff;
        if(diff>0) log('warn',`  >>> Quantum found +${diff} more matches than greedy <<<`);
        if(diff>0) log('warn',`  >>> In liver transplant: +${diff} matches = +${diff} lives saved <<<`);
        logHtml('',`  <span class="privacy">PRIVACY: matching uses anonymous indices only</span>`);
        log('','');

        log('step-label','[Step 6] Notification to Matched Individuals');
        vizOn('vN');
        d.matchDetails.slice(0,8).forEach(m=>{
          log('data',`  ${m.donor} <-> ${m.recip}  score=${m.score}`);
        });
        if(d.matchDetails.length>8)log('dim',`  ... +${d.matchDetails.length-8} more`);
        logHtml('',`  <span class="privacy">PRIVACY: refusal is invisible - silence indistinguishable from no notification</span>`);
        log('','');

        log('step-label','[Step 7] Mutual Consent -> Hospital Mediates Operation');
        vizOn('vH');
        log('data','  Both individuals consent via hyde-encrypted channel');
        log('data','  Hospital receives: "perform transplant for these two individuals"');
        logHtml('',`  <span class="privacy">PRIVACY: hospital knows nothing about how the match was found</span>`);
        log('','');

        log('header','=== COMPLETE ===');
        log('result',`  Greedy: ${d.greedyMatches} matches | Quantum: ${d.quantumMatches} matches | Diff: +${Math.max(0,diff)}`);
        log('dim',`  Brute force for this problem: ${Math.sqrt(d.nCompat).toFixed(0)}! combinations = impossible`);

        // Fill results table
        document.getElementById('resultsSection').classList.remove('hidden');
        document.getElementById('gM').textContent=d.greedyMatches;
        document.getElementById('qM').textContent=d.quantumMatches;
        document.getElementById('dM').textContent=diff>=0?`+${diff}`:diff;
        document.getElementById('gS').textContent=d.greedyScore.toFixed(2);
        document.getElementById('qS').textContent=d.quantumScore.toFixed(2);
        document.getElementById('dS').textContent=((d.quantumScore-d.greedyScore)/d.greedyScore*100).toFixed(1)+'%';
        document.getElementById('gT').textContent=d.greedyTime.toFixed(1)+'ms';
        document.getElementById('qT').textContent=d.quantumTime.toFixed(0)+'ms';

        document.getElementById('runBtn').classList.remove('running');
        document.getElementById('runBtn').textContent=T[lang].btnRun;
        break;
    }
  };

  worker.postMessage({nd,nr,sweeps:sw,seed:42});
}

setLang('ja');
</script>
</body>
</html>
